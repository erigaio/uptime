owner: erigaio
repo: uptime

sites:
  - name: API
    url: https://api.eriga.io/health/deep
  - name: AI
    url: https://ai.eriga.io/health/deep
  - name: MCP
    url: https://mcp.eriga.io/health/deep
  - name: App
    url: https://app.eriga.io
  - name: Site
    url: https://eriga.io
  - name: Docs
    url: https://doc.eriga.io
  - name: Dev docs
    url: https://dev.eriga.io

status-website:
  cname: status.eriga.io
  name: Eriga Status
  introTitle: "**Eriga Status** — real-time uptime of eriga.io services."
  introMessage: Monitoraggio automatico ogni 5 minuti via GitHub Actions.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

notifications:
  - type: email
    smtpHost: smtp.useplunk.com
    smtpPort: 465
    smtpUsername: $SMTP_USERNAME
    smtpPassword: $SMTP_PASSWORD
    from: upptime@eriga.io
    to: alerts@eriga.io
    ignoreSSL: false
    secure: true
